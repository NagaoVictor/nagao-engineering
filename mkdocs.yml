site_name: Nagao Engineering Encyclopedia

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.code.highlight
    - content.code.mermaid   # ← ATIVA MERMAID NO MKDOCS MATERIAL

markdown_extensions:
  - tables
  - admonition

  - toc:
      permalink: true

  - pymdownx.arithmatex:
      generic: true

  - pymdownx.details
  - pymdownx.highlight

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js   # ← ADICIONADO
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/furigana.js

extra_css:
  - stylesheets/extra.css

extra:
  math: true

nav:
  - Home: index.md
  - Guide: guide.md
  - Teste: teste.md
  - Japones: japones.md
  - Ingles: ingles.md

  - Mathematics:
      - Logic: mathematics/logica.md
      - Conjuntos: mathematics/conjuntos.md
      - Relações: mathematics/relacoes.md
      - Funções: mathematics/funcoes.md
      - Indução: mathematics/inducao.md
      - Boa Ordenação: mathematics/boaordenacao.md
      - Prova por Contradição: mathematics/contradicao.md
      - Provas Construtivas: mathematics/construtiva.md
      - Prova de Existência: mathematics/existencia.md
      - Teoria dos Números: mathematics/numeros.md
      - Teoria dos Gráfos: mathematics/grafos.md
      - Derivadas: mathematics/derivadas.md
      - Integrais: mathematics/integrais.md

  - Linux:
      - Linux: dispositivos/linux.md

  - C language:
      - C Language Medium Level: clang/medium.md
      - C Language Advanced Level: clang/advanced.md
      - C Arrays: clang/arrays.md
